services:
  - type: web
    name: be-oxide
    runtime: node
    root: .
    plan: free
    buildCommand: npm install --omit=dev
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        value: kushal.kabeer
      - key: ADMIN_PASSWORD
        sync: false
